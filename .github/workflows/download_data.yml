name: Descargar datos de mercado
on:
  schedule:
    # Múltiples horarios como red de seguridad (GitHub Actions puede saltear o demorar crons)
    # El script detecta si ya corrió hoy y no duplica la descarga
    - cron: '30 14 * * 1-5'   # 14:30 UTC (11:30 ART) — intento principal
    - cron: '0 17 * * 1-5'    # 17:00 UTC (14:00 ART) — respaldo 1
    - cron: '0 20 * * 1-5'    # 20:00 UTC (17:00 ART) — respaldo 2
    - cron: '0 23 * * 1-5'    # 23:00 UTC (20:00 ART) — respaldo 3
  workflow_dispatch:  # permite correrlo manualmente desde GitHub
 
jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
 
      - name: Verificar si ya se descargó hoy
        id: check
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          if [ -f data/download_status.json ]; then
            LAST=$(python3 -c "import json; d=json.load(open('data/download_status.json')); print(d.get('timestamp_utc','')[:10])" 2>/dev/null || echo "")
            if [ "$LAST" = "$TODAY" ]; then
              echo "Ya se descargaron datos hoy ($TODAY). Saltando."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "Última descarga: $LAST. Ejecutando para $TODAY."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No existe download_status.json. Primera ejecución."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
 
      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
 
      - name: Instalar dependencias
        if: steps.check.outputs.skip != 'true'
        run: pip install yfinance pandas numpy pytz
 
      - name: Descargar datos de mercado
        if: steps.check.outputs.skip != 'true'
        run: python scripts/download_data.py
 
      - name: Commit y push de los CSVs
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/merval_cierres.csv data/bovespa_cierres.csv data/sp500_cierres.csv data/download_status.json
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "data: actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
 
