name: Descargar datos de mercado
on:
  schedule:
    - cron: '30 14 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
 
jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
 
      - name: Verificar si ya se descargo hoy
        id: check
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          if [ -f data/download_status.json ]; then
            LAST=$(python3 -c "import json; d=json.load(open('data/download_status.json')); print(d.get('timestamp_utc','')[:10])" 2>/dev/null || echo "")
            if [ "$LAST" = "$TODAY" ]; then
              echo "Ya se descargaron datos hoy ($TODAY). Saltando."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "Ultima descarga: $LAST. Ejecutando para $TODAY."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "No existe download_status.json. Primera ejecucion."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
 
      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
 
      - name: Instalar dependencias
        if: steps.check.outputs.skip != 'true'
        run: pip install yfinance pandas numpy pytz
 
      - name: Descargar datos de mercado
        if: steps.check.outputs.skip != 'true'
        run: python scripts/download_data.py
 
      - name: Commit y push de los CSVs
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/merval_cierres.csv data/bovespa_cierres.csv data/sp500_cierres.csv data/download_status.json
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "data: actualizacion automatica $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
 
      - name: Disparar pipeline en Railway
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "Disparando pipeline en Railway..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            --max-time 30 \
            https://inversiones-bursatiles-production.up.railway.app/webhook/run)
          echo "Railway respondio: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Pipeline disparado exitosamente"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "Pipeline ya en ejecucion"
          else
            echo "Error al disparar pipeline (HTTP $HTTP_CODE) - revisar Railway"
          fi
 
