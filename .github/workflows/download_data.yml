name: Descargar datos de mercado

on:
  schedule:
    # Corre a las 14:50 UTC (11:50 ART) — 10 min antes que Railway
    - cron: '21 20 * * 1-5'
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install yfinance pandas numpy pytz

      - name: Descargar datos de mercado
        run: python scripts/download_data.py

      - name: Commit y push de los CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/merval_cierres.csv data/bovespa_cierres.csv data/sp500_cierres.csv data/download_status.json
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "data: actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
